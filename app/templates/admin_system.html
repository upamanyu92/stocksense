{% extends 'index.html' %}

{% block content %}
<div class="container mt-4">
  <h2>System Admin</h2>

  <!-- Background Worker -->
  <div class="card mb-3">
    <div class="card-body">
      <h4>Background Worker</h4>
      <p id="workerStatus">Loading...</p>
      <button id="startWorker" class="btn btn-success">Start Worker</button>
      <button id="stopWorker" class="btn btn-danger">Stop Worker</button>
    </div>
  </div>

  <!-- Daily Digest Email -->
  <div class="card mb-3">
    <div class="card-body">
      <h4>Daily Digest Email</h4>
      <p id="digestStatus">Loading...</p>
      <button id="enableDigest" class="btn btn-primary">Enable Digest</button>
      <button id="disableDigest" class="btn btn-secondary">Disable Digest</button>
    </div>
  </div>

  <!-- External Integrations Status -->
  <div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h4 class="mb-0">External Integrations</h4>
      <button id="refreshIntegrations" class="btn btn-sm btn-outline-secondary">
        <span id="refreshIcon">&#8635;</span> Refresh
      </button>
    </div>
    <div class="card-body">
      <div id="integrationsLoading" class="text-muted">Checking integrations&hellip;</div>
      <div id="integrationsError" class="alert alert-danger d-none"></div>
      <div id="integrationsGrid" class="row g-3 d-none"></div>
      <small id="integrationsCheckedAt" class="text-muted d-none mt-2 d-block"></small>
    </div>
  </div>
</div>

<style>
  .integration-card .badge-status {
    font-size: 0.85rem;
    padding: 0.35em 0.65em;
    border-radius: 0.5rem;
  }
  .integration-card .detail-text {
    font-size: 0.8rem;
    color: #6c757d;
    word-break: break-word;
  }
</style>

<script src="{{ url_for('static', filename='admin_system.js') }}"></script>
{% endblock %}
