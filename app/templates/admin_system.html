{% extends 'base.html' %}

{% block title %}System Admin — StockSense{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2><i class="fas fa-cogs"></i> System Admin</h2>
  <div class="card mb-3">
    <div class="card-body">
      <h4>Background Worker</h4>
      <p id="workerStatus">Loading...</p>
      <button id="startWorker" class="btn btn-success">Start Worker</button>
      <button id="stopWorker" class="btn btn-danger">Stop Worker</button>
    </div>
  </div>
  <div class="card mb-3">
    <div class="card-body">
      <h4>Daily Digest Email</h4>
      <p id="digestStatus">Loading...</p>
      <button id="enableDigest" class="btn btn-primary">Enable Digest</button>
      <button id="disableDigest" class="btn btn-secondary">Disable Digest</button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='services/api.js') }}"></script>
<script src="{{ url_for('static', filename='admin_system.js') }}"></script>
{% endblock %}
