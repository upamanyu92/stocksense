{% extends 'base.html' %}

{% block title %}Alerts Management — StockSense{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2><i class="fas fa-bell"></i> Alerts Management</h2>
  <div class="card mb-3">
    <div class="card-body">
      <form id="createAlertForm">
        <div class="row">
          <div class="col-md-3">
            <input class="form-control" placeholder="Symbol (e.g., TCS.BO)" id="alertSymbol" required />
          </div>
          <div class="col-md-3">
            <select id="alertType" class="form-control">
              <option value="price_above">Predicted price above</option>
              <option value="price_below">Predicted price below</option>
              <option value="predicted_change_above">Predicted change above %</option>
            </select>
          </div>
          <div class="col-md-2">
            <input type="number" step="0.01" class="form-control" id="alertValue" placeholder="Value" required />
          </div>
          <div class="col-md-2">
            <input type="number" step="0.01" class="form-control" id="alertMinConfidence" placeholder="Min confidence (0-1)" />
          </div>
          <div class="col-md-2">
            <button class="btn btn-primary" type="submit">Create Alert</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <h4>Your Alerts</h4>
      <div id="alertsList">Loading...</div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/alerts_mgmt.js"></script>
{% endblock %}
