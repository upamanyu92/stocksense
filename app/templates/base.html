<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}StockSense{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body { background-color: #f8f9fa; padding-top: 1rem; padding-bottom: 2rem; }
    .navbar-brand { font-weight: 700; }
    .main-content { max-width: 1200px; margin: 0 auto; padding: 1rem; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('dashboard.user_dashboard') }}">
        <i class="fas fa-chart-line"></i> StockSense
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarNav" aria-controls="navbarNav"
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('dashboard.user_dashboard') }}">
              <i class="fas fa-home"></i> Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('dashboard.stocks_list') }}">
              <i class="fas fa-list"></i> All Stocks
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('dashboard.alerts_page') }}">
              <i class="fas fa-bell"></i> Alerts
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('dashboard.notifications_page') }}">
              <i class="fas fa-envelope"></i> Notifications
            </a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          {% if current_user.is_authenticated %}
          <li class="nav-item">
            <span class="nav-link text-light">
              <i class="fas fa-user-circle"></i> {{ current_user.username }}
            </span>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('auth.logout') }}">
              <i class="fas fa-sign-out-alt"></i> Logout
            </a>
          </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <div class="main-content">
    {% block content %}{% endblock %}
  </div>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
